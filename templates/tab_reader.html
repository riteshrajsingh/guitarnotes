<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tab Reader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background:#f4f4f4; font-family:Arial, sans-serif; }
        .tab-canvas {
            background:#fff; padding:20px; border-radius:12px;
            font-family: 'Courier New', monospace; font-size:1.05rem; line-height:1.55;
            overflow-x:auto; white-space:nowrap;
            box-shadow:0 2px 10px rgba(0,0,0,.04);
            min-height:240px;
        }
        .tab-line { display:block; }
        .tab-cursor { background:#fff3cd; border-radius:3px; padding:0 2px; }
        .controls { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
        .song-card { cursor:pointer; transition:.2s; }
        .song-card:hover { transform:translateY(-2px); box-shadow:0 4px 10px rgba(0,0,0,.08);}
        .song-card.selected { border:2px solid #0d6efd; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="text-center mb-4">
        <h1 class="display-5 fw-bold">Tab Reader</h1>
        <p class="text-muted">Pick a tab. Hit play. Follow the moving cursor at your tempo.</p>
        <a href="{{ url_for('guitar_landing') }}" class="btn btn-outline-primary"><i class="bi bi-arrow-left"></i> Back to Home</a>
    </div>

    <div id="songs" class="row g-3 mb-4 justify-content-center"></div>

    <div class="card border-0 shadow-sm" style="max-width:1100px; margin:auto;">
        <div class="card-body">
            <h4 id="title" class="mb-3">—</h4>
            <div class="controls mb-3">
                <button id="play-btn" class="btn btn-primary"><i class="bi bi-play-fill"></i> Play</button>
                <button id="stop-btn" class="btn btn-outline-secondary" disabled><i class="bi bi-stop-fill"></i> Stop</button>
                <label class="ms-3"><strong>Tempo:</strong></label>
                <input type="range" id="tempo" min="40" max="200" value="80" style="width:160px;">
                <span><span id="tempo-val">80</span> BPM</span>
            </div>
            <div id="tab" class="tab-canvas">Pick a tab from above to start.</div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/practice.js') }}"></script>
<script>
const Chromatic = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const StringFolders = ['E1','A5','D4','G3','B2','E6'];
const StringTuning = ['E','A','D','G','B','E'];
const StringPC = StringTuning.map(n => Chromatic.indexOf(n));

// Tabs are a list of "events" — each event is {beats, notes:[{string, fret}]}
// String index 0 = high E (top line in tablature), 5 = low E (bottom).
// We store low-E first in arrays for consistency with the rest of the app.
// notes use {s: 0..5 where 0=high E, fret}
const Tabs = [
    {
        title: 'Smoke on the Water (riff)',
        notes: [
            {b:1, n:[{s:5,f:0}]},
            {b:1, n:[{s:5,f:3}]},
            {b:1, n:[{s:5,f:5}]},
            {b:2, n:[{s:5,f:0}]},
            {b:1, n:[{s:5,f:3}]},
            {b:1, n:[{s:5,f:6}]},
            {b:1, n:[{s:5,f:5}]},
            {b:2, n:[{s:5,f:0}]},
            {b:1, n:[{s:5,f:3}]},
            {b:1, n:[{s:5,f:5}]},
            {b:2, n:[{s:5,f:3}]},
            {b:2, n:[{s:5,f:0}]},
        ],
    },
    {
        title: 'Twinkle Twinkle (E string)',
        notes: [
            {b:1,n:[{s:0,f:0}]},{b:1,n:[{s:0,f:0}]},{b:1,n:[{s:0,f:7}]},{b:1,n:[{s:0,f:7}]},
            {b:1,n:[{s:0,f:9}]},{b:1,n:[{s:0,f:9}]},{b:2,n:[{s:0,f:7}]},
            {b:1,n:[{s:0,f:5}]},{b:1,n:[{s:0,f:5}]},{b:1,n:[{s:0,f:4}]},{b:1,n:[{s:0,f:4}]},
            {b:1,n:[{s:0,f:2}]},{b:1,n:[{s:0,f:2}]},{b:2,n:[{s:0,f:0}]},
        ],
    },
    {
        title: 'Seven Nation Army (riff)',
        notes: [
            {b:2, n:[{s:5,f:7}]},
            {b:1, n:[{s:5,f:7}]},
            {b:2, n:[{s:5,f:10}]},
            {b:1, n:[{s:5,f:7}]},
            {b:1, n:[{s:5,f:5}]},
            {b:2, n:[{s:5,f:3}]},
            {b:1, n:[{s:5,f:2}]},
            {b:2, n:[{s:5,f:0}]},
        ],
    },
    {
        title: 'Sweet Child O\' Mine (intro shape)',
        notes: [
            {b:1,n:[{s:1,f:12}]},{b:1,n:[{s:3,f:14}]},{b:1,n:[{s:2,f:14}]},{b:1,n:[{s:3,f:11}]},
            {b:1,n:[{s:1,f:12}]},{b:1,n:[{s:3,f:11}]},{b:1,n:[{s:2,f:14}]},{b:1,n:[{s:3,f:11}]},
            {b:1,n:[{s:1,f:12}]},{b:1,n:[{s:3,f:14}]},{b:1,n:[{s:2,f:14}]},{b:1,n:[{s:3,f:11}]},
            {b:1,n:[{s:1,f:12}]},{b:1,n:[{s:3,f:11}]},{b:1,n:[{s:2,f:14}]},{b:1,n:[{s:3,f:11}]},
        ],
    },
];

class Audio {
    constructor() { this.ctx=null; this.samples={}; }
    init() { if (!this.ctx) this.ctx = new (window.AudioContext||window.webkitAudioContext)(); }
    async load() {
        this.init();
        const tasks = [];
        StringFolders.forEach(f => {
            this.samples[f] = {};
            for (let fr=0; fr<=12; fr++) {
                tasks.push(fetch(`/guitar-samples/${f}/${fr}.m4a`)
                    .then(r => r.ok ? r.arrayBuffer() : null)
                    .then(b => b ? this.ctx.decodeAudioData(b) : null)
                    .then(a => { if (a) this.samples[f][fr] = a; }).catch(()=>{}));
            }
        });
        await Promise.allSettled(tasks);
    }
    // Tab uses s=0 high E. Convert to internal index (0=low E).
    play(s_high, fret, when, gain=0.6) {
        // s_high=0 -> high E = StringFolders[5]
        const folderIdx = 5 - s_high;
        const folder = StringFolders[folderIdx];
        // Samples only cover fret 0-12. Clamp.
        const f = Math.min(12, fret);
        const buf = this.samples[folder] && this.samples[folder][f];
        if (!buf) return;
        const src = this.ctx.createBufferSource(); src.buffer = buf;
        const g = this.ctx.createGain(); g.gain.setValueAtTime(gain, this.ctx.currentTime + when);
        src.connect(g); g.connect(this.ctx.destination);
        src.start(this.ctx.currentTime + when);
    }
}
const audio = new Audio();
audio.load();

const state = {
    selected: 0,
    tempo: 80,
    isPlaying: false,
    timeoutIds: [],
};

function renderSongs() {
    const el = document.getElementById('songs');
    el.innerHTML = '';
    Tabs.forEach((t, i) => {
        const c = document.createElement('div');
        c.className = 'col-md-3';
        c.innerHTML = `<div class="card song-card border-0 shadow-sm h-100" data-i="${i}">
            <div class="card-body text-center">
                <h6>${t.title}</h6>
            </div>
        </div>`;
        el.appendChild(c);
    });
    document.querySelectorAll('.song-card').forEach(c => {
        c.addEventListener('click', () => {
            stop();
            document.querySelectorAll('.song-card').forEach(x => x.classList.remove('selected'));
            c.classList.add('selected');
            state.selected = Number(c.dataset.i);
            renderTab();
        });
    });
    document.querySelector('.song-card').classList.add('selected');
}

function renderTab(highlightIdx = -1) {
    const tab = Tabs[state.selected];
    document.getElementById('title').textContent = tab.title;
    // 6 lines, top = high E (s=0), bottom = low E (s=5).
    const colW = 4;  // chars per event
    const lines = [];
    for (let s = 0; s < 6; s++) lines.push(StringTuning[5 - s] + '|');
    tab.notes.forEach((ev, idx) => {
        const slot = (idx === highlightIdx)
            ? `<span class="tab-cursor">@@</span>` // placeholder, replaced below per cell
            : null;
        const cell = (txt) => {
            const padded = String(txt).padStart(2, '-').padEnd(2, '-');
            if (idx === highlightIdx) return `<span class="tab-cursor">${padded}</span>--`;
            return padded + '--';
        };
        for (let s = 0; s < 6; s++) {
            const note = ev.n.find(n => n.s === s);
            lines[s] += cell(note ? note.fret : '-');
        }
    });
    const html = lines.map(l => `<span class="tab-line">${l}</span>`).join('');
    document.getElementById('tab').innerHTML = html;
}

function play() {
    if (state.isPlaying) return;
    audio.init();
    state.isPlaying = true;
    document.getElementById('play-btn').disabled = true;
    document.getElementById('stop-btn').disabled = false;
    const tab = Tabs[state.selected];
    const beatSec = 60 / state.tempo / 2;  // each "beat" unit = 8th note feel
    let acc = 0;
    tab.notes.forEach((ev, i) => {
        const when = acc;
        ev.n.forEach(note => audio.play(note.s, note.fret, when));
        const flashAt = when * 1000;
        const tid = setTimeout(() => renderTab(i), flashAt);
        state.timeoutIds.push(tid);
        acc += ev.b * beatSec;
    });
    const stopTid = setTimeout(() => {
        renderTab(-1);
        stop();
        if (window.GuitarPractice) GuitarPractice.record('tab-reader', 8);
    }, acc * 1000 + 200);
    state.timeoutIds.push(stopTid);
}

function stop() {
    state.timeoutIds.forEach(t => clearTimeout(t));
    state.timeoutIds = [];
    state.isPlaying = false;
    document.getElementById('play-btn').disabled = false;
    document.getElementById('stop-btn').disabled = true;
    renderTab(-1);
}

document.getElementById('play-btn').addEventListener('click', play);
document.getElementById('stop-btn').addEventListener('click', stop);
document.getElementById('tempo').addEventListener('input', (e) => {
    state.tempo = Number(e.target.value);
    document.getElementById('tempo-val').textContent = state.tempo;
});

renderSongs();
renderTab();
</script>
</body>
</html>
