<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar Tuner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background:#f4f4f4; font-family:Arial, sans-serif; }
        .tuner-card {
            max-width: 560px; margin: auto; background: #fff; border-radius: 18px;
            padding: 30px 30px 24px; box-shadow: 0 4px 20px rgba(0,0,0,.06);
        }
        .gauge-wrap { display:flex; justify-content:center; }
        .gauge-wrap svg { width:100%; max-width:480px; height:auto; }
        .note-text { font-size: 5rem; font-weight: 700; line-height: 1; }
        .note-text.in-tune { fill: #198754; }
        .note-text.close   { fill: #fd7e14; }
        .note-text.far     { fill: #6c757d; }
        .note-text.idle    { fill: #adb5bd; }
        .strings-row { display:flex; justify-content:space-around; margin-top: 18px; }
        .string-chip {
            padding: 8px 12px; border-radius: 8px; background: #f1f3f5; color: #495057;
            font-weight: 600; border: 2px solid transparent; min-width: 48px; text-align: center;
        }
        .string-chip.active { background: #fd7e14; color: #fff; border-color: #c25e0a; }
        .string-chip.tuned  { background: #198754; color: #fff; border-color: #0f5132; }
        .freq-line { color: #6c757d; font-size: .9rem; }
        .legend {
            display:flex; gap:14px; justify-content:center; margin-top:8px;
            font-size:.8rem; color:#6c757d;
        }
        .legend .swatch {
            display:inline-block; width:12px; height:12px; border-radius:3px; margin-right:5px;
            vertical-align:middle;
        }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="text-center mb-4">
        <h1 class="display-5 fw-bold">Tuner</h1>
        <p class="text-muted">Pluck a string. The dial shows how flat or sharp you are.</p>
        <a href="{{ url_for('guitar_landing') }}" class="btn btn-outline-primary"><i class="bi bi-arrow-left"></i> Back to Home</a>
    </div>

    <div class="tuner-card">
        <div class="gauge-wrap">
            <svg viewBox="0 0 480 280" xmlns="http://www.w3.org/2000/svg">
                <!-- Far zone (gray) — full half -->
                <path d="M 60 240 A 180 180 0 0 1 420 240" fill="none" stroke="#dee2e6" stroke-width="34" stroke-linecap="butt"/>

                <!-- Close zone (orange) — placeholders, drawn by JS for clean overlay -->
                <path id="zone-close-l" fill="none" stroke="#fd7e14" stroke-width="34"/>
                <path id="zone-close-r" fill="none" stroke="#fd7e14" stroke-width="34"/>

                <!-- In-tune zone (green) — small wedge at top -->
                <path id="zone-in-tune" fill="none" stroke="#198754" stroke-width="34"/>

                <!-- Tick marks -->
                <g id="ticks" stroke="#495057" stroke-width="2"></g>
                <text x="60"  y="268" text-anchor="middle" font-size="13" fill="#6c757d">−50¢</text>
                <text x="240" y="60"  text-anchor="middle" font-size="13" fill="#6c757d">0</text>
                <text x="420" y="268" text-anchor="middle" font-size="13" fill="#6c757d">+50¢</text>

                <!-- Note name + cents inside the dial -->
                <text id="note" class="note-text idle" x="240" y="180" text-anchor="middle">—</text>
                <text id="cents" x="240" y="215" text-anchor="middle" font-size="18" fill="#6c757d">—</text>

                <!-- Needle pivot + needle -->
                <g id="needle" transform="rotate(0 240 240)">
                    <line x1="240" y1="240" x2="240" y2="80" stroke="#0d6efd" stroke-width="4" stroke-linecap="round"/>
                    <circle cx="240" cy="80" r="6" fill="#0d6efd"/>
                </g>
                <circle cx="240" cy="240" r="12" fill="#212529"/>
                <circle cx="240" cy="240" r="5"  fill="#fff"/>
            </svg>
        </div>

        <div class="text-center mt-2">
            <div id="freq" class="freq-line">Press Start and allow microphone access</div>
        </div>

        <div class="strings-row">
            <div class="string-chip" data-note="E2">E (low)</div>
            <div class="string-chip" data-note="A2">A</div>
            <div class="string-chip" data-note="D3">D</div>
            <div class="string-chip" data-note="G3">G</div>
            <div class="string-chip" data-note="B3">B</div>
            <div class="string-chip" data-note="E4">E (high)</div>
        </div>

        <div class="legend">
            <span><span class="swatch" style="background:#198754;"></span>In tune (±5¢)</span>
            <span><span class="swatch" style="background:#fd7e14;"></span>Close (±15¢)</span>
            <span><span class="swatch" style="background:#dee2e6;"></span>Off</span>
        </div>

        <div class="text-center mt-3">
            <button id="start-btn" class="btn btn-primary btn-lg"><i class="bi bi-mic-fill"></i> Start Tuner</button>
            <button id="stop-btn" class="btn btn-outline-secondary btn-lg ms-2" style="display:none;"><i class="bi bi-stop-fill"></i> Stop</button>
        </div>
    </div>
    <p class="text-center text-muted small mt-3 mb-0">
        Works best in a quiet room. Pluck a single string at a time, near the bridge.
    </p>
</div>

<script src="{{ url_for('static', filename='js/practice.js') }}"></script>
<script>
const TargetNotes = [
    { name:'E2', freq: 82.41 },
    { name:'A2', freq: 110.00 },
    { name:'D3', freq: 146.83 },
    { name:'G3', freq: 196.00 },
    { name:'B3', freq: 246.94 },
    { name:'E4', freq: 329.63 },
];

// Geometry — centered at (240, 240), radius 180.
const CX = 240, CY = 240, R = 180;

// Convert cents (-50..+50) to angle in degrees from straight up (0 = top, -90 = left, +90 = right).
function centsToAngle(cents) {
    const c = Math.max(-50, Math.min(50, cents));
    return c * 1.8;  // -90..+90
}

// SVG arc path between two angles (-90..+90 around the top).
function arcPath(startA, endA) {
    const sa = startA * Math.PI / 180;
    const ea = endA * Math.PI / 180;
    const sx = CX + R * Math.sin(sa);
    const sy = CY - R * Math.cos(sa);
    const ex = CX + R * Math.sin(ea);
    const ey = CY - R * Math.cos(ea);
    return `M ${sx} ${sy} A ${R} ${R} 0 0 1 ${ex} ${ey}`;
}

// Paint zones once.
document.getElementById('zone-close-l').setAttribute('d', arcPath(centsToAngle(-15), centsToAngle(-5)));
document.getElementById('zone-close-r').setAttribute('d', arcPath(centsToAngle(5),  centsToAngle(15)));
document.getElementById('zone-in-tune').setAttribute('d', arcPath(centsToAngle(-5), centsToAngle(5)));

// Tick marks.
(function ticks() {
    const g = document.getElementById('ticks');
    [-50, -40, -30, -20, -10, 0, 10, 20, 30, 40, 50].forEach(c => {
        const a = centsToAngle(c) * Math.PI / 180;
        const r1 = R + 18;
        const r2 = c % 25 === 0 ? R + 32 : R + 24;
        const x1 = CX + r1 * Math.sin(a);
        const y1 = CY - r1 * Math.cos(a);
        const x2 = CX + r2 * Math.sin(a);
        const y2 = CY - r2 * Math.cos(a);
        g.innerHTML += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke-width="${c % 25 === 0 ? 2.5 : 1.5}"/>`;
    });
})();

let audioCtx = null, analyser = null, mediaStream = null, rafId = null, lastPracticeRecord = 0;

// Needle animation state. Decoupled from pitch detection so visual stays smooth
// regardless of how jittery individual autocorrelation results are.
let targetAngle = 0;
let renderedAngle = 0;
let lastSmoothedCents = 0;
let lastTargetName = null;
let silentSince = performance.now();
const SMOOTH_ALPHA = 0.18;     // EMA weight on new sample (0..1) — lower = smoother
const NEEDLE_LERP = 0.22;      // per-frame lerp toward target — lower = lazier needle

function animateNeedle() {
    renderedAngle += (targetAngle - renderedAngle) * NEEDLE_LERP;
    document.getElementById('needle').setAttribute(
        'transform', `rotate(${renderedAngle.toFixed(2)} ${CX} ${CY})`
    );
    requestAnimationFrame(animateNeedle);
}
animateNeedle();

function autoCorrelate(buf, sampleRate) {
    const SIZE = buf.length;
    let rms = 0;
    for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
    rms = Math.sqrt(rms / SIZE);
    if (rms < 0.015) return -1;
    let r1 = 0, r2 = SIZE - 1, threshold = 0.2;
    for (let i = 0; i < SIZE / 2; i++) {
        if (Math.abs(buf[i]) < threshold) { r1 = i; break; }
    }
    for (let i = 1; i < SIZE / 2; i++) {
        if (Math.abs(buf[SIZE - i]) < threshold) { r2 = SIZE - i; break; }
    }
    const trimmed = buf.slice(r1, r2);
    const N = trimmed.length;
    const c = new Array(N).fill(0);
    for (let i = 0; i < N; i++) {
        for (let j = 0; j < N - i; j++) {
            c[i] = c[i] + trimmed[j] * trimmed[j + i];
        }
    }
    let d = 0;
    while (d + 1 < N && c[d] > c[d + 1]) d++;
    let maxval = -1, maxpos = -1;
    for (let i = d; i < N; i++) {
        if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
    }
    let T0 = maxpos;
    if (T0 > 0 && T0 + 1 < N) {
        const x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1];
        const a = (x1 + x3 - 2 * x2) / 2;
        const b = (x3 - x1) / 2;
        if (a) T0 = T0 - b / (2 * a);
    }
    return sampleRate / T0;
}

function nearestTarget(freq) {
    let best = TargetNotes[0], bestCents = Infinity;
    for (const t of TargetNotes) {
        const cents = 1200 * Math.log2(freq / t.freq);
        if (Math.abs(cents) < Math.abs(bestCents)) { best = t; bestCents = cents; }
    }
    return { target: best, cents: bestCents };
}

function setNeedle(angleDeg) {
    targetAngle = angleDeg;
}
function setNoteText(text, klass) {
    const el = document.getElementById('note');
    el.textContent = text;
    el.setAttribute('class', 'note-text ' + klass);
}

async function start() {
    try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
            audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
        });
    } catch (e) {
        document.getElementById('freq').textContent = 'Microphone access denied: ' + e.message;
        return;
    }
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(mediaStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 4096;
    src.connect(analyser);
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('stop-btn').style.display = 'inline-block';
    loop();
}

function stop() {
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
    if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
    if (audioCtx) audioCtx.close();
    audioCtx = null; mediaStream = null; analyser = null;
    document.getElementById('start-btn').style.display = 'inline-block';
    document.getElementById('stop-btn').style.display = 'none';
    setNoteText('—', 'idle');
    document.getElementById('cents').textContent = '—';
    document.getElementById('freq').textContent = 'Tuner stopped.';
    setNeedle(0);
    lastTargetName = null;
    document.querySelectorAll('.string-chip').forEach(c => c.classList.remove('active', 'tuned'));
}

function loop() {
    rafId = requestAnimationFrame(loop);
    if (!analyser) return;
    const buf = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(buf);

    const freq = autoCorrelate(buf, audioCtx.sampleRate);
    const now = performance.now();

    // No clear pitch — either silence or noise. After a short hold, drift the
    // needle back to center and dim the readout instead of letting random
    // results jerk it around.
    if (freq === -1 || freq < 60 || freq > 1200) {
        if (now - silentSince > 350) {
            setNeedle(0);
            document.getElementById('cents').textContent = '—';
            setNoteText('—', 'idle');
            document.getElementById('freq').textContent = 'Listening…';
            lastTargetName = null;
        }
        return;
    }
    silentSince = now;

    const { target, cents } = nearestTarget(freq);

    // Snap when the detected target string changes; otherwise EMA-smooth.
    if (lastTargetName !== target.name) {
        lastSmoothedCents = cents;
        lastTargetName = target.name;
    } else {
        lastSmoothedCents = SMOOTH_ALPHA * cents + (1 - SMOOTH_ALPHA) * lastSmoothedCents;
    }
    const sCents = lastSmoothedCents;
    const abs = Math.abs(sCents);

    const klass = abs < 5 ? 'in-tune' : abs < 15 ? 'close' : 'far';
    setNoteText(target.name.replace(/[0-9]/g, ''), klass);
    document.getElementById('cents').textContent = (sCents >= 0 ? '+' : '') + sCents.toFixed(1) + '¢';
    document.getElementById('freq').textContent = `${freq.toFixed(2)} Hz   (target ${target.freq} Hz)`;
    setNeedle(centsToAngle(sCents));

    document.querySelectorAll('.string-chip').forEach(c => {
        const isThis = c.dataset.note === target.name;
        c.classList.toggle('active', isThis && abs >= 5);
        c.classList.toggle('tuned',  isThis && abs < 5);
    });

    if (abs < 5 && window.GuitarPractice) {
        if (now - lastPracticeRecord > 5000) {
            GuitarPractice.record('tuner', 2);
            lastPracticeRecord = now;
        }
    }
}

document.getElementById('start-btn').addEventListener('click', start);
document.getElementById('stop-btn').addEventListener('click', stop);
</script>
</body>
</html>
