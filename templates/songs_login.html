<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login &mdash; Song Book</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f4f4; font-family: 'Arial', sans-serif; }
        .login-card { max-width: 380px; margin: 4rem auto; padding: 2rem; background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <h1 class="h4 fw-bold mb-3">Admin Login</h1>
            <p class="text-muted small mb-4">Enter the admin password to add or edit songs.</p>
            {% if error %}
                <div class="alert alert-danger py-2">{{ error }}</div>
            {% endif %}
            <form method="POST" action="{{ url_for('songs_login') }}">
                <input type="hidden" name="next" value="{{ next }}">
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input id="password" name="password" type="password" class="form-control" autofocus required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Log in</button>
            </form>
            <div class="mt-3 text-center">
                <a href="{{ url_for('songs_list') }}" class="text-muted small text-decoration-none">&larr; Back to songs</a>
            </div>
        </div>
    </div>
</body>
</html>
